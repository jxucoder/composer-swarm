name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  test:
    name: Prompt pack
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Test
        run: npm test

      - name: Package smoke
        run: npm pack --dry-run --json
